  <text x="88" y="285" fill="#E2E8F0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" opacity="0.96">Tailor resumes, cover letters, and template-aware edits from a job posting</text>
  <text x="88" y="319" fill="#E2E8F0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" opacity="0.96">while keeping private candidate data outside the public repository.</text>

