    <text x="854" y="394" fill="#BFDBFE" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16">Private source-of-truth stays local</text>
    <text x="854" y="418" fill="#BFDBFE" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16">or in <tspan font-weight="700">offerhelpe_privat</tspan>.</text>
